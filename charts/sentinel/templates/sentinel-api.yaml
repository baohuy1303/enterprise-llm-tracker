apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-api
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "sentinel.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "sentinel.fullname" . }}-api
      annotations:
        # Roll the deployment whenever the rendered config or secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
    spec:
      # Block startup until Postgres, Redis, and Kafka are reachable so the
      # one-shot migration + Kafka EnsureTopic on boot don't race their deps.
      initContainers:
        {{- include "sentinel.waitForDeps" . | nindent 8 }}
      containers:
        - name: sentinel-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: SENTINEL_CONFIG
              value: /etc/sentinel/sentinel.yaml
            - name: SENTINEL_MIGRATIONS_DIR
              value: /app/migrations
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel.fullname" . }}-secrets
                  key: ADMIN_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel.fullname" . }}-secrets
                  key: SLACK_BOT_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel.fullname" . }}-secrets
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/sentinel
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sentinel.fullname" . }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-api
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "sentinel.fullname" . }}-api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
{{- if .Values.api.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sentinel.fullname" . }}-api
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sentinel.fullname" . }}-api
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
{{- end }}
