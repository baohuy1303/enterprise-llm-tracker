{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sentinel.fullname" . }}-postgres-data
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}-postgres
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  replicas: 1
  # RWO PVC can't attach to two pods at once, so never run old+new together.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "sentinel.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "sentinel.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sentinel.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            # Use a subdirectory so Postgres doesn't trip over the volume's
            # lost+found dir on first init.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "sentinel.fullname" . }}-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}-postgres
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "sentinel.fullname" . }}-postgres
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
{{- end }}
