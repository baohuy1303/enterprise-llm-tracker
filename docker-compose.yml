services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5433:5432" # if dont have pg instance then use 5432:5432, else 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_engineers.sql:/docker-entrypoint-initdb.d/001_engineers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  (Claude Code → collector)
      - "4318:4318"   # OTLP HTTP  (alternative ingestion)
      - "8889:8889"   # Prometheus  (collector self-metrics, scraped in Stage 9)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
